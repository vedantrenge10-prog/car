<!DOCTYPE html>
<html>

<head>
<title>Toyota Supra</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(120deg,#0f0f0f,#1a1a1a,#000000);
    color:white;
    text-align:center;
}

/* Title */
h1{
    font-size:50px;
    margin-top:30px;
    letter-spacing:3px;
    color:#f5c542;
}

/* Car container */
.car-box{
    width:750px;
    margin:auto;
    margin-top:30px;
    padding:25px;
    background:#111;
    border-radius:15px;
    box-shadow:0px 10px 30px rgba(0,0,0,0.7);
}

/* Model viewer */
model-viewer{
    width:100%;
    height:450px;
    background:#000;
    border-radius:10px;
}

/* Car specs */
.specs{
    margin-top:20px;
    font-size:18px;
    line-height:30px;
    color:#ddd;
}

/* Back button */
.back-btn{
    display:inline-block;
    margin-top:25px;
    padding:12px 28px;
    text-decoration:none;
    background:#f5c542;
    color:black;
    border-radius:8px;
    font-weight:bold;
    transition:0.3s;
}

.back-btn:hover{
    background:#ffd95c;
    transform:scale(1.05);
}

</style>

</head>

<body>

<h1>Toyota Supra</h1>

<div class="car-box">

<model-viewer
src="../model/supra.glb"
auto-rotate
camera-controls
shadow-intensity="1"
environment-image="neutral"
exposure="1">
</model-viewer>

<div class="specs">
Engine: 3.0L Turbo <br>
Top Speed: 250 km/h <br>
0-100 km/h: 4.1 sec <br>
Power: 382 HP
</div>

<a class="back-btn" href="../index.html">⬅ Back to Cars</a>

</div>

</body>
</html>
